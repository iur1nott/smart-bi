# Dashboard Builder - Docker Compose Configuration
# Uses UV for dependency management, PostgreSQL for persistence

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dashboard_builder_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dashboard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard_password}
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_builder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dashboard_user} -d ${POSTGRES_DB:-dashboard_builder}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard_network

  # Streamlit Application (Production)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard_builder_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dashboard_user}:${POSTGRES_PASSWORD:-dashboard_password}@postgres:5432/${POSTGRES_DB:-dashboard_builder}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - ./data:/app/data
      - ./download:/app/download
    ports:
      - "${APP_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dashboard_network
    profiles:
      - prod

  # Streamlit Application (Development with hot reload)
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dashboard_builder_app_dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dashboard_user}:${POSTGRES_PASSWORD:-dashboard_password}@postgres:5432/${POSTGRES_DB:-dashboard_builder}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key}
      STREAMLIT_SERVER_PORT: 8501
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: "poll"
    volumes:
      - .:/app:cached
      - uv_cache:/root/.cache/uv
    ports:
      - "${APP_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - dashboard_network
    profiles:
      - dev

  # pgAdmin (Development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dashboard_builder_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    depends_on:
      - postgres
    networks:
      - dashboard_network
    profiles:
      - dev

networks:
  dashboard_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uv_cache:
    driver: local
